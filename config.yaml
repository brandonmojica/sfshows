enrichment:
  min_tag_count: 1            # Ignore MusicBrainz tags voted fewer than N times
  request_delay_ms: 1100      # Delay between MusicBrainz calls (enforces 1 req/sec limit)
  cache_ttl_days: 30          # Re-fetch artist genre cache after N days

database:
  path: "~/.sfshows/sfshows.db"

notification:
  max_shows_per_digest: 20    # Truncate digest at N shows
  include_ticket_url: true
