  # replace this with: group_name: "Your Group Chat Name"
  recipients:
    - "+14083343076"
    # - "+15559876543"

schedule:
  days_ahead: 14

genres:
  - label: "Indie/Alternative"
    tags: ["indie", "alternative", "shoegaze", "dream pop", "indie rock", "indie pop"]
  - label: "Electronic/Dance"
    tags: ["electronic", "dance", "techno", "house", "edm", "synth", "ambient", "electro"]
  - label: "Hip-Hop/R&B"
    tags: ["hip hop", "hip-hop", "rap", "r&b", "rnb", "soul", "trap", "neo soul"]
  - label: "Rock/Metal"
    tags: ["rock", "metal", "punk", "hardcore", "grunge", "post-rock", "hard rock"]

